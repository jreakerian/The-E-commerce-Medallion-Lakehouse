name: dbt CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  dbt:
    runs-on: ubuntu-latest
    env:
      DBT_PROFILES_DIR: ${{ github.workspace }}/dbt_project
      SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
      SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
      SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
      SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
      SNOWFLAKE_DATABASE: ${{ secrets.SNOWFLAKE_DATABASE }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache dbt packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.dbt
            dbt_project/dbt_packages
          key: dbt-packages-${{ hashFiles('dbt_project/packages.yml') }}
          restore-keys: |
            dbt-packages-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install dbt-snowflake dbt-checkpoint sqlfluff elementary-data

      - name: Install dbt packages
        run: |
          cd dbt_project
          dbt deps

      - name: Run dbt parse (validates SQL)
        run: |
          cd dbt_project
          dbt parse

      - name: Run dbt-checkpoint
        run: |
          cd dbt_project
          dbt-checkpoint

      - name: Run sqlfluff lint
        run: |
          cd dbt_project
          sqlfluff lint --dialect snowflake models/

      - name: Run dbt build (slim CI - only modified)
        if: github.event_name == 'pull_request'
        run: |
          cd dbt_project
          dbt build --select state:modified+ --defer --state target

      - name: Run dbt build (full on main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          cd dbt_project
          dbt build

      - name: Run dbt test with store_failures
        run: |
          cd dbt_project
          dbt test --store-failures

      - name: Upload Elementary artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: elementary-report
          path: dbt_project/target/elementary/
          retention-days: 7

      - name: Upload dbt artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dbt-artifacts
          path: dbt_project/target/
          retention-days: 7