repos:
  - repo: https://github.com/dbt-checkpoint/dbt-checkpoint
    rev: v1.4.0
    hooks:
      - id: check-model-has-description
      - id: check-column-has-description
      - id: check-model-has-tests
      - id: check-column-has-tests
      - id: check-model-contract
      - id: check-unique-key-exists
      - id: check-model-materialization
      - id: check-source-has-description
      - id: check-source-has-loaded-at-field
      - id: check-source-has-freshness
      - id: check-model-tags
      - id: check-column-has-data-type

  - repo: https://github.com/sqlfluff/sqlfluff
    rev: 3.2.0
    hooks:
      - id: sqlfluff-lint
        args: ["--dialect", "snowflake"]
      - id: sqlfluff-fix
        args: ["--dialect", "snowflake"]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict