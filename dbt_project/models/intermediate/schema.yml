version: 2

models:
  - name: int_order_payments_pivoted
    description: "Pivoted payment amounts by payment type per order."
    columns:
      - name: order_id
        data_type: varchar
        description: "Foreign key to orders table."

      - name: boleto_amount
        data_type: number(10,2)
        description: "Total amount paid via boleto for this order."

      - name: credit_card_amount
        data_type: number(10,2)
        description: "Total amount paid via credit card for this order."

      - name: voucher_amount
        data_type: number(10,2)
        description: "Total amount paid via voucher for this order."

      - name: debit_card_amount
        data_type: number(10,2)
        description: "Total amount paid via debit card for this order."

      - name: total_amount
        data_type: number(10,2)
        description: "Total payment amount across all payment types for this order."