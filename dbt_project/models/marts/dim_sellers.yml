version: 2

models:
  - name: dim_sellers
    description: "Dimension table for sellers with performance metrics."
    config:
      contract:
        enabled: true
    tests:
      # -- Volume: detect unexpected row count changes --
      - elementary.volume_anomalies

      # -- Dimension: detect distribution shifts in seller_state --
      - elementary.dimension_anomalies:
          arguments:
            dimensions:
              - seller_state

    columns:
      - name: seller_id
        data_type: varchar
        description: "Unique identifier for a seller."
        tests:
          - unique
          - not_null

      - name: seller_zip_code_prefix
        data_type: varchar
        description: "First 5 digits of seller ZIP code."
        tests:
          - not_null

      - name: seller_city
        data_type: varchar
        description: "Seller city."
        tests:
          - not_null

      - name: seller_state
        data_type: varchar
        description: "Seller state (2-letter code)."
        tests:
          - not_null

      - name: total_sales_value
        data_type: number(10,2)
        description: "Total sales value fulfilled by this seller."
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
          - elementary.column_anomalies:
              arguments:
                column_anomalies:
                  - average
                  - max

      - name: total_orders_fulfilled
        data_type: number
        description: "Total unique orders fulfilled by this seller."
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0

      - name: average_freight_value
        data_type: number(10,2)
        description: "Average freight value for this seller's items."
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0

      - name: average_fulfillment_days
        data_type: number
        description: "Average days from purchase to carrier delivery."
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
          - elementary.column_anomalies:
              arguments:
                column_anomalies:
                  - average
