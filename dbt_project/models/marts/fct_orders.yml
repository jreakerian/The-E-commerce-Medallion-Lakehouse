version: 2

models:
  - name: fct_orders
    description: "The central fact table for all Olist orders."
    config:
      contract:
        enabled: true
    tests:
      # -- Volume: detect unexpected row count spikes/drops --
      - elementary.volume_anomalies:
          timestamp_column: order_purchase_timestamp
          training_period:
            period: month
            count: 3
          sensitivity: 3

      # -- Freshness: detect data delivery delays --
      - elementary.freshness_anomalies:
          timestamp_column: order_purchase_timestamp
          training_period:
            period: month
            count: 3

      # -- Dimension: detect distribution shifts in order_status --
      - elementary.dimension_anomalies:
          dimensions:
            - order_status
          timestamp_column: order_purchase_timestamp
          training_period:
            period: month
            count: 3

    columns:
      - name: order_id
        data_type: varchar
        description: "The unique identifier for an order."
        tests:
          - unique
          - not_null

      - name: customer_id
        data_type: varchar
        description: "Foreign key to the customers dimension table."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_customers')
                field: customer_id

      - name: order_status
        data_type: varchar
        description: "Current status of the order."
        tests:
          - not_null

      - name: order_purchase_timestamp
        data_type: timestamp_ntz
        description: "Timestamp when the order was placed."
        tests:
          - not_null

      - name: order_delivered_customer_date
        data_type: timestamp_ntz
        description: "Timestamp when the order was delivered to the customer."

      - name: total_price
        data_type: number(10,2)
        description: "Sum of item prices for the order."
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
          - elementary.column_anomalies:
              arguments:
                column_anomalies:
                  - null_rate
                  - zero_rate
                  - average
                timestamp_column: order_purchase_timestamp
                training_period:
                  period: month
                  count: 3

      - name: total_freight_value
        data_type: number(10,2)
        description: "Sum of freight values for the order."
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0

      - name: number_of_items
        data_type: number
        description: "Count of items in the order."
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 1
          - elementary.column_anomalies:
              arguments:
                column_anomalies:
                  - average
                  - max
                timestamp_column: order_purchase_timestamp
                training_period:
                  period: month
                  count: 3

      - name: total_payment_value
        data_type: number(10,2)
        description: "The total value paid for the order."
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
          - elementary.column_anomalies:
              column_anomalies:
                - null_rate
                - zero_rate
                - average
              timestamp_column: order_purchase_timestamp
              training_period:
                period: month
                count: 3
