version: 2

semantic_models:
  - name: fct_orders_semantic
    model: ref('fct_orders')
    defaults:
      agg_time_dimension: order_purchase_timestamp
    entities:
      - name: order_id
        type: primary
      - name: customer_id
        type: foreign
    dimensions:
      - name: order_status
        type: categorical
      - name: order_purchase_timestamp
        type: time
        type_params:
          time_granularity: day
    measures:
      - name: order_count
        expr: order_id
        agg: count
      - name: total_revenue_measure
        expr: total_price
        agg: sum
      - name: total_payment_measure
        expr: total_payment_value
        agg: sum
      - name: delivered_orders_count
        expr: case when order_status = 'delivered' then 1 else 0 end
        agg: sum
      - name: fulfillment_days
        expr: DATEDIFF('day', order_purchase_timestamp, order_delivered_customer_date)
        agg: sum

  - name: fct_order_items_semantic
    model: ref('fct_order_items')
    defaults:
      agg_time_dimension: order_purchase_timestamp
    entities:
      - name: order_item_id
        type: primary
      - name: order_id
        type: foreign
      - name: product_id
        type: foreign
      - name: seller_id
        type: foreign
    dimensions:
      - name: order_purchase_timestamp
        type: time
        type_params:
          time_granularity: day
    measures:
      - name: items_sold
        expr: 1
        agg: sum
      - name: gmv
        expr: price
        agg: sum

  - name: dim_customers_semantic
    model: ref('dim_customers')
    defaults:
      agg_time_dimension: first_order_date
    entities:
      - name: customer_id
        type: primary
    dimensions:
      - name: first_order_date
        type: time
        type_params:
          time_granularity: day
      - name: customer_city
        type: categorical
    measures:
      - name: unique_customers
        expr: customer_id
        agg: count_distinct
      - name: returning_customers_measure
        expr: case when number_of_orders > 1 then customer_id else null end
        agg: count_distinct

  - name: metricflow_time_spine_semantic
    model: ref('metricflow_time_spine')
    entities:
      - name: time_spine_id
        type: primary
        expr: date_day
    dimensions:
      - name: date_day
        type: time
        type_params:
          time_granularity: day

metrics:
  - name: total_orders
    label: Total Orders
    description: "Total number of orders placed."
    type: simple
    type_params:
      measure: order_count

  - name: total_revenue
    label: Total Revenue
    description: "Total revenue from all orders."
    type: simple
    type_params:
      measure: total_revenue_measure

  - name: average_order_value
    label: Average Order Value
    description: "Average order value across all orders."
    type: ratio
    type_params:
      numerator: total_revenue
      denominator: total_orders

  - name: total_customers
    label: Total Customers
    description: "Total unique customers who placed orders."
    type: simple
    type_params:
      measure: unique_customers

  - name: repeat_customer_rate
    label: Repeat Customer Rate
    description: "Percentage of customers who placed more than one order."
    type: derived
    type_params:
      expr: returning / total
      metrics:
        - name: total_customers
          alias: total
        - name: returning_customers
          alias: returning

  - name: returning_customers
    label: Returning Customers
    description: "Customers with more than one order."
    type: simple
    type_params:
      measure: returning_customers_measure

  - name: total_items_sold
    label: Total Items Sold
    description: "Total number of items sold across all orders."
    type: simple
    type_params:
      measure: items_sold

  - name: total_gmv
    label: Total GMV
    description: "Gross Merchandise Value (sum of item prices)."
    type: simple
    type_params:
      measure: gmv

  - name: fulfillment_rate
    label: Fulfillment Rate
    description: "Percentage of orders delivered vs total orders."
    type: ratio
    type_params:
      numerator: delivered_orders
      denominator: total_orders

  - name: delivered_orders
    label: Delivered Orders
    type: simple
    type_params:
      measure: delivered_orders_count

  - name: average_fulfillment_days
    label: Average Fulfillment Days
    description: "Average days from purchase to customer delivery."
    type: ratio
    type_params:
      numerator: total_fulfillment_days
      denominator: total_orders

  - name: total_fulfillment_days
    label: Total Fulfillment Days
    type: simple
    type_params:
      measure: fulfillment_days