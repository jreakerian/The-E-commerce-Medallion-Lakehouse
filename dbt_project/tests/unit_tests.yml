unit_tests:
  # ---------------------------------------------------------------------------
  # fct_orders: Verifies aggregation of order items + payment join logic
  # ---------------------------------------------------------------------------
  - name: test_fct_orders_aggregation
    description: >
      Verify that fct_orders correctly aggregates item prices/freight/counts from
      order items and joins the total payment value from the pivoted payments model.
      Also verifies COALESCE handles orders with no items gracefully.
    model: fct_orders
    given:
      - input: ref('stg_olist_orders')
        rows:
          - {order_id: "ord_001", customer_id: "cust_A", order_status: "delivered",
             order_purchase_timestamp: "2023-06-15 10:30:00",
             order_approved_at: "2023-06-15 11:00:00",
             order_delivered_carrier_date: "2023-06-16 08:00:00",
             order_delivered_customer_date: "2023-06-20 14:00:00",
             order_estimated_delivery_date: "2023-06-25 00:00:00"}
          - {order_id: "ord_002", customer_id: "cust_B", order_status: "shipped",
             order_purchase_timestamp: "2023-06-16 09:00:00",
             order_approved_at: "2023-06-16 09:30:00",
             order_delivered_carrier_date: null,
             order_delivered_customer_date: null,
             order_estimated_delivery_date: "2023-06-22 00:00:00"}
      - input: ref('stg_olist_order_items')
        rows:
          # ord_001 has 2 items
          - {order_id: "ord_001", order_item_id: 1, product_id: "prod_X",
             seller_id: "sell_1", shipping_limit_date: "2023-06-18 00:00:00",
             price: 100.00, freight_value: 15.50}
          - {order_id: "ord_001", order_item_id: 2, product_id: "prod_Y",
             seller_id: "sell_2", shipping_limit_date: "2023-06-18 00:00:00",
             price: 49.99, freight_value: 10.00}
          # ord_002 has no items (tests COALESCE)
      - input: ref('stg_olist_order_payments')
        rows:
          # ord_001: two credit card payments + one boleto = 175.49 total
          - {order_id: "ord_001", payment_sequential: 1,
             payment_type: "credit_card", payment_installments: 3,
             payment_value: 100.00}
          - {order_id: "ord_001", payment_sequential: 2,
             payment_type: "credit_card", payment_installments: 1,
             payment_value: 50.00}
          - {order_id: "ord_001", payment_sequential: 3,
             payment_type: "boleto", payment_installments: 1,
             payment_value: 25.49}
          # ord_002 has no payments (tests COALESCE)
    expect:
      rows:
        - {order_id: "ord_001", customer_id: "cust_A", order_status: "delivered",
           total_price: 149.99, total_freight_value: 25.50,
           number_of_items: 2, total_payment_value: 175.49}
        - {order_id: "ord_002", customer_id: "cust_B", order_status: "shipped",
           total_price: 0, total_freight_value: 0,
           number_of_items: 0, total_payment_value: 0}

  # ---------------------------------------------------------------------------
  # dim_customers: Verifies first/most_recent order date + order count logic
  # ---------------------------------------------------------------------------
  - name: test_dim_customers_order_metrics
    description: >
      Verify that dim_customers correctly computes first_order_date,
      most_recent_order_date, and number_of_orders. Also ensures customers
      with no orders get COALESCE'd to 0 orders.
    model: dim_customers
    given:
      - input: ref('stg_olist_customers')
        rows:
          - {customer_id: "cust_A", customer_unique_id: "uniq_A",
             customer_zip_code_prefix: "01310", customer_city: "sao paulo",
             customer_state: "SP"}
          - {customer_id: "cust_B", customer_unique_id: "uniq_B",
             customer_zip_code_prefix: "20040", customer_city: "rio de janeiro",
             customer_state: "RJ"}
          - {customer_id: "cust_C", customer_unique_id: "uniq_C",
             customer_zip_code_prefix: "30130", customer_city: "belo horizonte",
             customer_state: "MG"}
      - input: ref('stg_olist_orders')
        rows:
          # cust_A has 2 orders
          - {order_id: "ord_001", customer_id: "cust_A", order_status: "delivered",
             order_purchase_timestamp: "2023-01-15 10:00:00",
             order_approved_at: null, order_delivered_carrier_date: null,
             order_delivered_customer_date: null, order_estimated_delivery_date: null}
          - {order_id: "ord_002", customer_id: "cust_A", order_status: "delivered",
             order_purchase_timestamp: "2023-06-20 14:00:00",
             order_approved_at: null, order_delivered_carrier_date: null,
             order_delivered_customer_date: null, order_estimated_delivery_date: null}
          # cust_B has 1 order
          - {order_id: "ord_003", customer_id: "cust_B", order_status: "shipped",
             order_purchase_timestamp: "2023-03-10 09:00:00",
             order_approved_at: null, order_delivered_carrier_date: null,
             order_delivered_customer_date: null, order_estimated_delivery_date: null}
          # cust_C has no orders (tests COALESCE)
    expect:
      rows:
        - {customer_id: "cust_A", customer_unique_id: "uniq_A",
           customer_zip_code_prefix: "01310", customer_city: "sao paulo",
           customer_state: "SP",
           first_order_date: "2023-01-15 10:00:00",
           most_recent_order_date: "2023-06-20 14:00:00",
           number_of_orders: 2}
        - {customer_id: "cust_B", customer_unique_id: "uniq_B",
           customer_zip_code_prefix: "20040", customer_city: "rio de janeiro",
           customer_state: "RJ",
           first_order_date: "2023-03-10 09:00:00",
           most_recent_order_date: "2023-03-10 09:00:00",
           number_of_orders: 1}
        - {customer_id: "cust_C", customer_unique_id: "uniq_C",
           customer_zip_code_prefix: "30130", customer_city: "belo horizonte",
           customer_state: "MG",
           first_order_date: null,
           most_recent_order_date: null,
           number_of_orders: 0}
